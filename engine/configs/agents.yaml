# Per-role LLM configuration for AgentTest.
#
# Each role gets its own model, max_tokens, and temperature; call sites
# only pass prompts. Keep this file in sync with the AgentRole enum in
# `engine/src/agenttest/agents/role.py` — the factory iterates AgentRole
# and looks each entry up here.
#
# See `docs/project_plan.md` § 4 for what each role does in the pipeline.

agents:
  # Generates one JUnit 5 test method per (risk_site, owasp_risk) pair.
  # Receives: target Java source, OWASP risk description, agent-pattern
  # examples, the invariant to assert. Cache disabled in S2: the system
  # prompt is ~400 tokens (one OWASP entry), below Anthropic's ~1024-token
  # cache minimum. Re-enable in S3 when the catalog grows past 4 entries
  # (see docs/plan/sprint-2.md § "Locked decision 5").
  test_synthesizer:
    provider: anthropic
    model: claude-sonnet-4-6
    max_tokens: 1500
    temperature: 0.3
    enabled: true
    prompt_cache_enabled: false

  # Single-prompt baseline for the eval comparison. Same Java input,
  # no retrieval / analyzer / per-risk loop. The eval harness calls
  # this via `POST /generate/baseline`. max_tokens raised to 4096 in
  # S3 — the Step 0 smoke (docs/plan/sprint-3.md) showed the response
  # truncates at 2048 mid-method, which would unfairly tank baseline
  # recall via accidental COMPILE_FAIL.
  baseline:
    provider: anthropic
    model: claude-sonnet-4-6
    max_tokens: 4096
    temperature: 0.3
    enabled: true

  # Model-as-judge, used only for secondary metrics (refusal correctness,
  # qualitative spot-check). Primary recall / precision are objective —
  # they run generated tests against injected risks, no judge involved.
  judge:
    provider: anthropic
    model: claude-haiku-4-5-20251001
    max_tokens: 500
    temperature: 0.0
    enabled: true
