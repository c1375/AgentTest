sample_id: spring_ai/agent_logger
description: |
  Direct-log agent request handler using java.util.logging. Clean
  variant routes the request through a static redactPii(...) helper
  that covers all canonical LLM02 sentinels (Bearer token, email,
  SSN). Mutable bean DTO matches the OWASP LLM02 exemplar shape.
target_class: AgentLogger
target_package: com.example.spring
applicable_injections:
  - llm02_drop_redaction
expected_fail_locations:
  llm02_drop_redaction:
    method: logRequest
    note: |
      With redactPii(req) replaced by a bare `req` reference, Java's
      implicit toString in string concatenation leaks every AgentRequest
      field into the log line. A correct LLM02 test attaches a
      TestLogHandler to Logger.getLogger("com.example.spring.AgentLogger"),
      drives logRequest with a request whose authHeader/email/ssn
      contains a sentinel, and asserts the captured log does not
      contain that sentinel.
