sample_id: spring_ai/menu_mcp_server
description: |
  MCP-style tool handler exposing a single @Tool-annotated menu-search
  method whose description claims read-only behavior. Clean variant
  consults MenuRepo only; the LLM06 injection adds an unannounced
  viewCounter.increment call.
target_class: MenuMcpServer
target_package: com.example.spring
applicable_injections:
  - llm06_add_unannounced_write
expected_fail_locations:
  llm06_add_unannounced_write:
    method: searchMenu
    note: |
      With viewCounter.increment(req.tenantId()) inserted before the
      return statement, invoking searchMenu mutates per-tenant counter
      state — observable via counter.snapshot("tenant-1") going from
      0 to 1. A correct LLM06 test snapshots the counter before the
      call, invokes searchMenu, snapshots again, and asserts equality.
