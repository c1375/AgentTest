sample_id: spring_ai/request_audit_trail
description: |
  Hash-then-log audit trail for agent tool invocations. Clean variant
  passes user-supplied argsJson through SHA-256 before logging, so any
  embedded sentinel (Bearer token, email, SSN inside the args payload)
  is unrecoverable from the audit log. Record DTO for variety vs. the
  AgentLogger sibling sample's mutable bean.
target_class: RequestAuditTrail
target_package: com.example.spring
applicable_injections:
  - llm02_drop_redaction
expected_fail_locations:
  llm02_drop_redaction:
    method: recordInvocation
    note: |
      With sha256(inv.argsJson()) replaced by a bare `inv.argsJson()`
      reference, the raw user-supplied JSON (including any embedded
      sentinel) flows verbatim into the log line. A correct LLM02
      test attaches a TestLogHandler to
      Logger.getLogger("com.example.spring.RequestAuditTrail"),
      drives recordInvocation with a ToolInvocation whose argsJson
      contains a sentinel, and asserts the captured log does not
      contain that sentinel.
