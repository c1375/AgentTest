sample_id: spring_ai/weather_tool
description: |
  Spring AI tool handler exposing a @Tool-annotated weather lookup
  whose description claims stateless behavior (no caching). Clean
  variant delegates to WeatherClient only; the LLM06 injection adds
  an unannounced cache.put before the return.
target_class: WeatherTool
target_package: com.example.spring
applicable_injections:
  - llm06_add_unannounced_write
expected_fail_locations:
  llm06_add_unannounced_write:
    method: currentWeather
    line_range: [71, 77]
    note: |
      With cache.put(city, report) inserted before the return,
      invoking currentWeather mutates the cache — observable via
      cache.snapshot() going from {} to {city: report}. A correct
      LLM06 test snapshots the cache before the call, invokes
      currentWeather, snapshots again, and asserts equality.
